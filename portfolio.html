<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | AVIP Solutions </title>
  <link rel="stylesheet" href="css/style.css?v=1.1"> <!-- kada u buducnosti bude izmena samo promeniti veziju sa 1.1. na novo -->
</head>
<body>

<div id="nav-placeholder"></div>

<section style="padding: 180px 8% 100px;">
  <div style="text-align: center; margin-bottom: 60px;">
    <h1 style="font-family: 'Sora',serif; font-size: 3rem;">Naši <span style="color: var(--akcenat-plava);">Radovi</span></h1>
    <p style="color: var(--tekst-izbledeli);">Pregled uspešnih projekata i digitalnih transformacija.</p>
  </div>

  <div id="mreza-portfolia" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px;">
  </div>
</section>

<div id="footer-placeholder"></div>



<script>

  const stavkePortfolia = [
    { ime: "PlusFin", kategorija: "Finansije", inicijali: "PF", detalji: "Moderno web rešenje za knjigovodstvenu agenciju.", veza: "https://plusfin.co/" },
    { ime: "Centar Srce", kategorija: "NVO", inicijali: "CS", detalji: "Platforma za pružanje emotivne podrške i edukaciju.", veza: "https://centarsrce.org/" },
    { ime: "Parabola Net", kategorija: "Telekomunikacije", inicijali: "PN", detalji: "Portal za korisnike internet provajdera.", veza: "https://www.parabolanet.com/" },
    { ime: "FKL Serbia", kategorija: "Industrija", inicijali: "FKL", detalji: "Prezentacija industrijskih komponenti i ležajeva.", veza: "https://www.fkl-serbia.com/" },
    { ime: "MK Tomas", kategorija: "Transport", inicijali: "MKT", detalji: "Sistem za rezervaciju i prezentaciju transportnih usluga.", veza: "https://mktomas.com/" },
    { ime: "Kamper RS", kategorija: "Turizam", inicijali: "KRS", detalji: "Sajt za iznajmljivanje i prodaju kamper vozila.", veza: "https://kamper.rs/" },
    { ime: "Etno Kamp", kategorija: "Turizam", inicijali: "EK", detalji: "Web prezentacija kamp naselja i prirode.", veza: "https://etnokamp.rs/" },
    { ime: "Andrić", kategorija: "Inženjering", inicijali: "A", detalji: "Korporativni sajt za građevinsku firmu.", veza: "https://andric.rs/" },
    { ime: "Il Mondo Design", kategorija: "Dizajn", inicijali: "IMD", detalji: "Portfolio sajt za studio za dizajn enterijera.", veza: "https://ilmondodesign.com/" },
    { ime: "FKL Temerin App", kategorija: "Softver", inicijali: "APP", detalji: "Namenska aplikacija za internu optimizaciju procesa.", veza: "https://www.fkl-serbia.com/" }
  ];

  const mreza = document.getElementById('mreza-portfolia');


  stavkePortfolia.forEach(projekat => {
    const kartica = document.createElement('div');
    kartica.innerHTML = `
      <a href="${projekat.veza}" target="_blank" class="portfolio-link">
        <div class="portfolio-kartica">

          <div class="kontejner-slike" style="position: relative; overflow: hidden; background: linear-gradient(135deg, #1a202c 0%, #11151d 100%); display: flex; align-items: center; justify-content: center;">

            <img src="img/slikazakartice.png" alt="${projekat.ime}"
                 style="width: 100%; height: 100%; object-fit: cover; display: block; position: absolute; top: 0; left: 0;"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">

            <div style="display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%;">
                <div style="font-family: 'Sora', sans-serif; font-size: 3.5rem; font-weight: 800; color: #3b82f6; opacity: 0.2;">
                    ${projekat.inicijali}
                </div>
            </div>

            <div style="position: absolute; bottom: 15px; right: 15px; font-size: 0.65rem; color: rgba(255,255,255,0.4); letter-spacing: 2px; font-weight: 600; pointer-events: none; z-index: 5;">
              AVIP SOLUTIONS
            </div>
          </div>

          <div class="sadrzaj-kartice">
            <span class="kategorija">${projekat.kategorija}</span>
            <h3 style="margin: 10px 0; color: var(--tekst-glavni);">${projekat.ime}</h3>
            <p style="margin-bottom: 15px;">${projekat.detalji}</p>
            <div style="margin-top: auto; color: var(--akcenat-plava); font-weight: 600; font-size: 0.9rem; display: flex; align-items: center;">
              Poseti sajt <span class="strelica" style="margin-left: 5px;">→</span>
            </div>
          </div>
        </div>
      </a>
    `;
    mreza.appendChild(kartica);
  });
</script>
<script src="js/skriptaZaNaviFoot.js?v=1.1"></script>
</body>
</html>
